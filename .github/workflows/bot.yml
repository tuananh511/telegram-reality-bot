name: Reality Bot
on:
  workflow_dispatch:
  push:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: pip install -r requirements.txt
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
      - name: Commit memory
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          if [ -f used_messages.json ]; then
            git add used_messages.json
            git commit -m "update memory" || echo "Khong co gi thay doi de commit"
            git push
          else
            echo "used_messages.json khong ton tai sau khi chay - bo qua buoc commit (co the do bot khong gui quote lan nay, hoac file chua tung duoc tao)."
          fi
